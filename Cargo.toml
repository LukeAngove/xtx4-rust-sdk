[workspace]
members = [
    "xtx4_buttons",
    "xtx4_host",
    "xtx4_platform_interface",
    "xtx4_platform",
    "xtx4_sample",
    "ssd1677",
]
# Exclude from platform specific targets from build; only build when depended on.
# Stops build errors on incompatible platforms
exclude = ["xtx4_desktop", "xtx4_esp32"]
resolver = "2"
